name: Deno

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb  # v2.0.3
        with:
          deno-version: v2.x

      - name: Verify formatting
        run: deno fmt --check

      - name: Run linter
        run: deno lint

      - name: Run tests
        run: deno test --no-check --allow-env

  swamp:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb  # v2.0.3
        with:
          deno-version: v2.x

      - name: Install swamp
        run: |
          curl -fsSL \
            "https://github.com/systeminit/swamp/releases/latest/download/swamp-linux-x86_64" \
            -o /usr/local/bin/swamp
          chmod +x /usr/local/bin/swamp
          swamp --version 2>&1

      - name: Initialize swamp repo
        run: swamp init --force --json

      - name: Verify extension formatting
        run: swamp extension fmt extensions/models/homekit_manifest.yaml --check --json

      - name: Verify model type loads
        run: swamp model type describe @bixu/homekit --json

      - name: Verify all methods registered
        run: |
          methods=$(swamp model type describe @bixu/homekit --json \
            | jq -r '.methods[].name')
          for expected in discover pair readSensors controlAccessory listAccessories; do
            if ! echo "$methods" | grep -qx "$expected"; then
              echo "Missing method: $expected"
              exit 1
            fi
          done

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, swamp]
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb  # v2.0.3
        with:
          deno-version: v2.x

      - name: Install swamp
        run: |
          curl -fsSL \
            "https://github.com/systeminit/swamp/releases/latest/download/swamp-linux-x86_64" \
            -o /usr/local/bin/swamp
          chmod +x /usr/local/bin/swamp

      - name: Initialize swamp repo
        run: swamp init --force --json

      - name: Authenticate with swamp registry
        run: >
          swamp auth login
          --no-browser
          --server "${{ secrets.SWAMP_CLUB_URL }}"
          --username "${{ secrets.SWAMP_CLUB_USERNAME }}"
          --password "${{ secrets.SWAMP_CLUB_PASSWORD }}"

      - name: Publish extension
        run: swamp extension push extensions/models/homekit_manifest.yaml -y --json
